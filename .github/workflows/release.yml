# SPDX-License-Identifier: LGPL-2.1-or-later
name: Release

# LibreAgent ships only the platform-neutral source library
# (LibreAgent::Core); it produces no separate binary artifacts (consumers
# build it from the CONFIG package or via FetchContent). So this workflow is
# notes-only: on a release tag it verifies the tag's GPG signature against the
# published key, then creates a GitHub release whose notes come from the
# matching CHANGELOG section. Binary-artifact signing (cosign) lives in the
# components that distribute binaries.

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+*'

jobs:
  verify-signature:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Import LibreSCRS release public key
        run: |
          gpg --import KEYS
          EXPECTED_FPR='6B05889AC9A6A7188DF639B06F27A989C2031D16'
          gpg --list-keys --with-colons "$EXPECTED_FPR" | grep -q "^pub" \
            || { echo "::error::Public key import failed or fingerprint mismatch"; exit 1; }

      - name: Verify tag signature
        # Rejects any unsigned or wrong-fingerprint tag.
        run: git verify-tag "${{ github.ref_name }}"

  release:
    needs: verify-signature
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: CHANGELOG.md
          sparse-checkout-cone-mode: false

      - name: Prepare release notes from CHANGELOG
        # Extract the section whose `## ` header contains the tag version
        # (matches `## [X.Y.Z]`, `## [X.Y.Z] — date`, or
        # `## [Unreleased] — X.Y.Z`). Fall back to auto-generated notes when the
        # CHANGELOG has no section for this tag so a release never ships empty
        # notes. --generate-notes and --notes-file are mutually exclusive, hence
        # the shell branch.
        run: |
          VER="${GITHUB_REF_NAME#v}"
          awk -v ver="$VER" \
            '/^## / { if ($0 ~ ("(\\[|[[:space:]])" ver "(\\]|[[:space:]]|$)")) {f=1; next} else if (f) exit } f' \
            CHANGELOG.md > "$RUNNER_TEMP/relnotes.md"
          if [ -s "$RUNNER_TEMP/relnotes.md" ]; then
            echo "NOTES_ARG=--notes-file $RUNNER_TEMP/relnotes.md" >> "$GITHUB_ENV"
          else
            echo "No CHANGELOG section for $VER — falling back to --generate-notes"
            echo "NOTES_ARG=--generate-notes" >> "$GITHUB_ENV"
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Mark X.Y.Z-{rc,beta,alpha,…} as pre-release; everything else stable.
          PRERELEASE_FLAG=""
          case "${{ github.ref_name }}" in
              *-rc*|*-beta*|*-alpha*|*-pre*) PRERELEASE_FLAG="--prerelease" ;;
          esac
          gh release create "${{ github.ref_name }}" \
              --repo "${{ github.repository }}" \
              --title "${{ github.ref_name }}" \
              $NOTES_ARG \
              $PRERELEASE_FLAG
